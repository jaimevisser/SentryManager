services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-development}
      PORT: 8080
      TESLACAM_ROOT: /data/TeslaCam
    ports:
      - "8765:8080"
    volumes:
      - ./config:/app/config:ro
      - ${TESLACAM_PATH:-./data/TeslaCam}:/data/TeslaCam
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "app.renderer.worker"]
    environment:
      APP_ENV: ${APP_ENV:-development}
      TESLACAM_ROOT: /data/TeslaCam
      RENDER_WORKER_POLL_INTERVAL_SECONDS: ${RENDER_WORKER_POLL_INTERVAL_SECONDS:-1.0}
    volumes:
      - ./config:/app/config:ro
      - ${TESLACAM_PATH:-./data/TeslaCam}:/data/TeslaCam
    restart: unless-stopped
