services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-development}
      PORT: 8080
      TESLACAM_ROOT: /data/TeslaCam
    ports:
      - "8765:8080"
    volumes:
      - ./config:/app/config:ro
      - ${TESLACAM_PATH:-./data/TeslaCam}:/data/TeslaCam
      - ./data/Previews:/data/Previews
    restart: unless-stopped
