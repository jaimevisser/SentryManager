services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PORT: 8080
      RENDER_WORKER_ENABLED: ${RENDER_WORKER_ENABLED:-true}
      RENDER_WORKER_POLL_INTERVAL_SECONDS: ${RENDER_WORKER_POLL_INTERVAL_SECONDS:-1.0}
      SENTRY_PLAYER_PREROLL_SECONDS: ${SENTRY_PLAYER_PREROLL_SECONDS:-20}
      TESLACAM_ROOT: /data/TeslaCam
    ports:
      - "8765:8080"
    volumes:
      - ${TESLACAM_PATH:-./data/TeslaCam}:/data/TeslaCam
    restart: unless-stopped
