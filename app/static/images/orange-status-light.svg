    </filter>
    <clipPath id="discClip">
      <circle cx="160" cy="160" r="93"/>
    </clipPath>
    <path id="spoke" d="M155.5 88 C155.5 85.515 157.515 83.5 160 83.5 C162.485 83.5 164.5 85.515 164.5 88 L161.6 131 C161.6 132.657 160.884 134 160 134 C159.116 134 158.4 132.657 158.4 131 Z" fill="url(#spokeFill)"/>
  </defs>

  <rect width="320" height="320" fill="url(#bg)"/>
  <circle cx="160" cy="160" r="112" fill="url(#bevelBg)"/>
  <rect x="156" y="0" width="8" height="320" fill="#000000"/>
  <circle cx="160" cy="160" r="94" fill="#000000"/>

  <g clip-path="url(#discClip)" filter="url(#softGlow)">
    <circle cx="160" cy="160" r="91" fill="url(#redUnderlay)"/>
    <g opacity="0.98">
